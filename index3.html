<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lepexasu | Hobby</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --accent-purple: #bc13fe;
            --bright-purple: #d670ff;
            --pixel-font: 'Press Start 2P', cursive;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); filter: blur(5px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        @keyframes blinker { 50% { opacity: 0; } }

        .blink { animation: blinker 1s linear infinite; }

        .fade-out {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease-in-out;
        }

        body.shutting-down .fade-out { opacity: 1; }

        body {
            margin: 0;
            background-color: var(--bg-color);
            background-image: 
                linear-gradient(0deg, rgba(188, 19, 254, 0.05) 2px, transparent 2px),
                linear-gradient(90deg, rgba(188, 19, 254, 0.05) 2px, transparent 2px);
            background-size: 40px 40px;
            color: #fff;
            font-family: var(--pixel-font);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        body::before {
            content: " ";
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 100;
        }

        .card {
            background: rgba(0, 0, 0, 0.95);
            border: 4px double var(--accent-purple);
            padding: 40px;
            text-align: center;
            box-shadow: 10px 10px 0px rgba(188, 19, 254, 0.15);
            animation: fadeIn 0.8s ease-out;
            max-width: 800px;
            width: 90%;
            position: relative;
            z-index: 1;
        }

        h1 {
            font-size: 1.4rem;
            color: var(--bright-purple);
            text-shadow: 0 0 10px var(--accent-purple);
            margin-bottom: 40px;
        }

        .hobby-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .hobby-item {
            border: 2px solid var(--accent-purple);
            padding: 15px;
            background: rgba(188, 19, 254, 0.05);
            text-align: left;
            transition: 0.3s;
        }

        .hobby-item:hover {
            background: rgba(188, 19, 254, 0.15);
            transform: scale(1.02);
            box-shadow: 0 0 15px rgba(188, 19, 254, 0.3);
        }

        .hobby-title {
            color: var(--accent-purple);
            font-size: 0.6rem;
            margin-bottom: 10px;
            display: block;
        }

        .hobby-desc {
            font-size: 0.7rem;
            line-height: 1.6;
            color: #eee;
        }

        .disconnect-btn {
            display: inline-block;
            margin-top: 10px;
            padding: 15px 35px;
            border: 2px solid #444;
            color: #444;
            text-decoration: none;
            font-size: 0.65rem;
            cursor: pointer;
            transition: 0.3s;
            background: none;
            font-family: var(--pixel-font);
        }

        .disconnect-btn:hover {
            border-color: #ff0000;
            color: #ff0000;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.4);
        }

        @media (max-width: 650px) {
            .hobby-grid { grid-template-columns: 1fr; }
            h1 { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <div class="fade-out"></div>

    <div class="card">
        <h1>MY HOBBIES<span class="blink">_</span></h1>

        <div class="hobby-grid">
            <div class="hobby-item">
                <span class="hobby-title">[ XXX ]</span>
                <span class="hobby-desc">XXX.</span>
            </div>
            <div class="hobby-item">
                <span class="hobby-title">[ XXX ]</span>
                <span class="hobby-desc">XXX.</span>
            </div>
            <div class="hobby-item">
                <span class="hobby-title">[ XXX ]</span>
                <span class="hobby-desc">XXX.</span>
            </div>
            <div class="hobby-item">
                <span class="hobby-title">[ XXX ]</span>
                <span class="hobby-desc">XXX.</span>
            </div>
        </div>

        <button class="disconnect-btn" onclick="disconnect()">DISCONNECT</button>
    </div>

    <script>
        function disconnect() {
            document.body.classList.add('shutting-down');
            setTimeout(() => {
                window.location.href = "https://lepexasu.github.io/biolepexasu.github.io/";
            }, 500);
        }
    </script>

</body>
</html>
