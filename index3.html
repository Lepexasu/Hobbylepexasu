<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lepexasu | Hobby</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        :root {
            --bg-color: #050505;
            --accent-gold: #ffcc00;
            --bright-gold: #fff0a4;
            --pixel-font: 'Press Start 2P', cursive;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); filter: blur(5px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        @keyframes blinker { 50% { opacity: 0; } }
        .blink { animation: blinker 1s linear infinite; }

        .fade-out {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease-in-out;
        }

        body.shutting-down .fade-out { opacity: 1; }

        * {
            box-sizing: border-box;
            image-rendering: pixelated;
        }

        body {
            margin: 0;
            padding: 40px 20px;
            background-color: var(--bg-color);
            background-image: 
                linear-gradient(0deg, rgba(255, 204, 0, 0.03) 2px, transparent 2px),
                linear-gradient(90deg, rgba(255, 204, 0, 0.03) 2px, transparent 2px);
            background-size: 40px 40px;
            color: #fff;
            font-family: var(--pixel-font);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        body::before {
            content: " ";
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.3) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 100;
        }

        /* КОНТЕЙНЕР 550px */
        .main-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            width: 100%;
            max-width: 550px;
        }

        .header-images {
            display: flex;
            gap: 15px;
            width: 100%;
            animation: fadeIn 1s ease-out forwards;
        }

        .header-images img {
            flex: 1;
            width: calc(50% - 7.5px);
            height: 200px; /* ВЫСОТА КАК В ПЕРВОМ КОДЕ */
            object-fit: cover;
            border: 4px double var(--accent-gold);
            padding: 5px;
            background: rgba(255, 204, 0, 0.05);
            box-shadow: 0 0 15px rgba(255, 204, 0, 0.1);
        }

        .card {
            background: rgba(0, 0, 0, 0.95);
            border: 4px double var(--accent-gold);
            padding: 30px; /* ОТСТУП КАК В ПЕРВОМ КОДЕ */
            text-align: center;
            box-shadow: 10px 10px 0px rgba(255, 204, 0, 0.1);
            animation: fadeIn 0.8s ease-out;
            width: 100%;
            position: relative;
            z-index: 1;
        }

        h1 {
            font-size: 1.1rem;
            color: var(--bright-gold);
            text-shadow: 0 0 10px var(--accent-gold);
            margin: 0 0 30px 0;
        }

        .hobby-grid {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 25px;
        }

        .hobby-item {
            border-left: 4px solid var(--accent-gold); /* Стиль из первого кода */
            padding: 15px;
            background: rgba(255, 204, 0, 0.05);
            text-align: left;
            transition: 0.3s;
            overflow: visible;
        }

        .hobby-item:hover {
            background: rgba(255, 204, 0, 0.1);
            transform: translateX(5px);
        }

        .hobby-title {
            color: #444; /* Цвет меток из первого кода */
            font-size: 0.5rem;
            margin-bottom: 8px;
            display: block;
        }

        .hobby-desc {
            font-size: 0.65rem;
            line-height: 1.6;
            color: #eee;
            display: block;
            transition: 0.3s ease-in-out;
            transform-origin: left center;
        }

        .hobby-item:hover .hobby-desc {
            transform: scale(1.3); /* Масштаб из первого кода */
            color: var(--bright-gold);
            z-index: 10;
            position: relative;
        }

        .disconnect-btn {
            display: inline-block;
            margin-top: 10px;
            padding: 12px 30px;
            border: 2px solid #333;
            color: #333;
            text-decoration: none;
            font-size: 0.55rem;
            cursor: pointer;
            transition: 0.3s;
            background: none;
            font-family: var(--pixel-font);
        }

        .disconnect-btn:hover {
            border-color: var(--accent-gold);
            color: var(--accent-gold);
            box-shadow: 0 0 20px rgba(255, 204, 0, 0.2);
        }
    </style>
</head>
<body>

    <div class="fade-out"></div>

    <div class="main-container">
        <div class="header-images">
            <img src="https://i.ibb.co/wFcZLCkB/photo-2026-04-09-18-35-47.jpg" alt="Photo 1">
            <img src="https://i.ibb.co/CDb9LSS/photo-2026-04-09-18-36-02.jpg" alt="Photo 2">
        </div>

        <div class="card">
            <h1>MY HOBBIES<span class="blink">_</span></h1>

            <div class="hobby-grid">
                <div class="hobby-item">
                    <span class="hobby-title">[ HOBBY 01 ]</span>
                    <span class="hobby-desc">Construction in Minecraft.</span>
                </div>
                <div class="hobby-item">
                    <span class="hobby-title">[ HOBBY 02 ]</span>
                    <span class="hobby-desc">Cooking.</span>
                </div>
                <div class="hobby-item">
                    <span class="hobby-title">[ HOBBY 03 ]</span>
                    <span class="hobby-desc">Cycling.</span>
                </div>
                <div class="hobby-item">
                    <span class="hobby-title">[ HOBBY 04 ]</span>
                    <span class="hobby-desc">Board games.</span>
                </div>
            </div>

            <button class="disconnect-btn" onclick="disconnect()">DISCONNECT</button>
        </div>
    </div>

    <script>
        function disconnect() {
            document.body.classList.add('shutting-down');
            setTimeout(() => {
                window.location.href = "https://lepexasu.github.io/biolepexasu.github.io/";
            }, 500);
        }
    </script>

</body>
</html>
